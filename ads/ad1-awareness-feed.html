<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad 1 — Awareness Feed Ad</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Nunito', sans-serif; }

        .ad-frame {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #A8D5BA 0%, #C3AED6 40%, #FFD6E0 70%, #FFF3B0 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 50px;
        }

        /* Scattered decorative eggs */
        .egg { position: absolute; opacity: 0.15; pointer-events: none; }
        .e1 { top: 30px; left: 40px; font-size: 65px; transform: rotate(-20deg); }
        .e2 { top: 50px; right: 70px; font-size: 50px; transform: rotate(15deg); }
        .e3 { top: 180px; left: 140px; font-size: 40px; transform: rotate(25deg); }
        .e4 { bottom: 160px; right: 100px; font-size: 55px; transform: rotate(-10deg); }
        .e5 { bottom: 60px; left: 80px; font-size: 45px; transform: rotate(30deg); }
        .e6 { top: 280px; right: 40px; font-size: 35px; transform: rotate(-25deg); }
        .e7 { bottom: 220px; left: 30px; font-size: 60px; transform: rotate(5deg); }

        /* Top URL bar */
        .url-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.75);
            color: white;
            text-align: center;
            padding: 14px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 10;
        }
        .url-bar span { color: #A8D5BA; }

        .logo {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.6);
            border-radius: 32px;
            padding: 22px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 66px;
            font-weight: 800;
            color: #2D2D2D;
            line-height: 1.08;
            margin-bottom: 14px;
            position: relative;
            z-index: 2;
        }
        h1 span { color: #5CB85C; }

        .subtitle {
            font-size: 30px;
            font-weight: 700;
            color: #2D2D2D;
            opacity: 0.6;
            margin-bottom: 24px;
            position: relative;
            z-index: 2;
        }

        .features {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            position: relative;
            z-index: 2;
        }
        .feature {
            background: rgba(255,255,255,0.75);
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 21px;
            font-weight: 800;
            color: #2D2D2D;
        }

        .cta-btn {
            background: #5CB85C;
            color: white;
            font-family: 'Baloo 2', cursive;
            font-size: 36px;
            font-weight: 700;
            padding: 18px 56px;
            border-radius: 50px;
            border: none;
            box-shadow: 0 8px 30px rgba(92,184,92,0.4);
            position: relative;
            z-index: 2;
            margin-bottom: 12px;
        }

        .location {
            font-size: 20px;
            font-weight: 700;
            color: #2D2D2D;
            opacity: 0.45;
            position: relative;
            z-index: 2;
        }

        /* Bottom urgency strip */
        .urgency-strip {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #FF6B6B;
            color: white;
            text-align: center;
            padding: 14px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="ad-frame">
        <div class="url-bar">🌐 <span>theeasyeasterbunnychs.com</span></div>

        <span class="egg e1">🥚</span>
        <span class="egg e2">🐣</span>
        <span class="egg e3">🌸</span>
        <span class="egg e4">🐰</span>
        <span class="egg e5">🌷</span>
        <span class="egg e6">🥚</span>
        <span class="egg e7">🐣</span>

        <img src="https://img1.wsimg.com/isteam/ip/b6ba9a0d-1cda-404e-b4f6-a4c6836ca4c5/EEB2.png" alt="Logo" class="logo">
        <h1>Wake Up to an<br><span>Easter Egg Hunt</span><br>in Your Yard!</h1>
        <p class="subtitle">We set it up overnight. You enjoy the magic.</p>
        <div class="features">
            <div class="feature">🥚 Eggs & Candy</div>
            <div class="feature">⭐ Golden Eggs</div>
            <div class="feature">✉️ Bunny Letter</div>
        </div>
        <button class="cta-btn">Reserve Your Yard Now 🐣</button>
        <p class="location">📍 Serving Charleston, SC & the Lowcountry</p>

        <div class="urgency-strip">⏰ SPOTS ARE LIMITED — REGISTER TODAY! Starting at $45</div>
    </div>
</body>
</html>
